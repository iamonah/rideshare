syntax = "proto3";

package rideshare.trip.v1;

option go_package = "github.com/iamonah/rideshare/shared/proto/pb/trippb;trippb";

// TripService manages ride trips.
service TripService {
  // Provides a preview of a trip, including route and fare estimates.
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  // Creates a new trip based on the selected fare and user information.
  rpc CreateTrip(CreateTripRequest) returns (CreateTripResponse);
}

message PreviewTripRequest {
  string user_id = 1;
  Coordinate pickup = 2;
  Coordinate destination = 3;
}

message PreviewTripResponse {
  string trip_id = 1;
  Route route = 2;
  repeated RideFare ride_fares = 3;
}

message Coordinate {
  double latitude = 1;
  double longitude = 2;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}

message Route {
  repeated Geometry geometry = 1;
  double distance = 2;
  double duration = 3;
}

message RideFare {
  string id = 1;
  string user_id = 2;
  string package_slug = 3;
  double total_price_in_cents = 4;
  Route route = 5;
}

message CreateTripRequest {
  string ride_fare_id = 1;
  string user_id = 2;
}

message CreateTripResponse {
  string trip_id = 1;
  Trip trip = 2;
}

message Trip {
  string id = 1;
  RideFare selected_fare = 2;
  Route route = 3;
  string status = 4;
  string user_id = 5;
  TripDriver driver = 6;
}

// Static driver object that is used to store the driver information
message TripDriver {
  string id = 1;
  string name = 2;
  string profile_picture = 3;
  string car_plate = 4;
}